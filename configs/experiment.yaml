# ============================================================
# ECLIPSE Thesis — Master Experiment Configuration
# ============================================================
# All hyperparameters live here. Never hardcode values in code.
# Use `scale` presets to switch between local debug and full runs.

# --- Scale presets ---
# Set scale to "debug" for local MacBook testing, "full" for Colab/DGX
scale: debug

presets:
  debug:
    num_buildings: 2
    num_episodes: 10
    num_seeds: 1
    device: cpu
  full:
    num_buildings: 6
    num_episodes: 300
    num_seeds: 5
    device: cuda

# --- CityLearn environment ---
env:
  schema: citylearn_challenge_2022_phase_all  # or custom schema path
  simulation_period_months: 12  # 1 year per episode
  buildings_per_agent: 3  # in full scale; 1 in debug

  reward:
    alpha: 1.0    # peak demand penalty weight
    beta: 1.0     # electricity cost weight
    gamma: 0.5    # ramping penalty weight

# --- RL baselines (Phase 1) ---
baselines:
  ppo:
    total_timesteps: 500_000
    learning_rate: 0.0003
    clip_range: 0.2
    batch_size: 2048
    n_epochs: 10
    gae_lambda: 0.95
    gamma: 0.99
    policy_arch: [256, 256]

  sac:
    total_timesteps: 500_000
    learning_rate: 0.0003
    buffer_size: 100_000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    policy_arch: [256, 256]

# --- Trajectory-to-rationale conversion (Phase 1) ---
rationale:
  num_expert_rollouts: 100
  quality_filter_percentile: 20  # drop bottom 20% of episodes
  target_dataset_size: 40_000

# --- SLM fine-tuning (Phase 1) ---
finetuning:
  model_name: Qwen/Qwen3-4B  # or meta-llama/Llama-3.1-8B
  lora_rank: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  epochs: 3
  learning_rate: 0.0002
  batch_size: 4
  gradient_accumulation_steps: 8  # effective batch = 32
  max_seq_length: 1024

  # Validation gate
  validation_gate:
    min_performance_ratio: 0.70  # ≥70% of expert RL performance
    eval_episodes: 10

# --- Online RL (Phase 2) ---
online_rl:
  algorithm: grpo  # or ppo_lm
  num_candidates: 4  # GRPO: candidate generations per observation
  update_frequency: 100  # update every N timesteps
  learning_rate: 0.00005
  kl_penalty_coeff: 0.1  # KL divergence against reference model
  max_generation_length: 256

# --- Coordination (Phase 2) ---
coordination:
  experience_sharing:
    exchange_frequency: 10  # every N episodes
    buffer_merge_ratio: 0.5  # fraction of partner data to include

# --- Experiment tracking ---
wandb:
  project: eclipse-thesis
  entity: null  # set your wandb username
  tags: []

# --- Checkpointing (Colab resilience) ---
checkpoint:
  save_every_n_episodes: 10
  save_dir: /content/drive/MyDrive/eclipse-thesis/checkpoints  # Colab path
  local_save_dir: ./checkpoints  # local fallback

# --- Reproducibility ---
seed: 42  # override per-run with --seed flag
